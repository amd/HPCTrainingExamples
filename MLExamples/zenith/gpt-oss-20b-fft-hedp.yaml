base_model: /app/models/gpt-oss-20b
#flash_attention: true
use_kernels: false
#model_kwargs:
#  attn_implementation: "flash_attention_2"

flash_attention: false
overrides_of_model_kwargs:
  attn_implementation: "eager" # Switch from flash_attention_2 to sdpa

model_quantization_config: Mxfp4Config
model_quantization_config_kwargs:
  dequantize: true

# XXX JB after finished with initial testing, run training with cutcrossentropy
#plugins:
#  - axolotl.integrations.cut_cross_entropy.CutCrossEntropyPlugin

# prevent oom by not putting model to GPU before sharding
experimental_skip_move_to_device: true

datasets:
  - path: /app/datasets/SFT_HEDP_dataset/hedp_dataset.jsonl
    type: chat_template
    chat_template: tokenizer_default
    field_messages: conversations
    message_property_mappings:
      content: value
      role: from
    roles:
      user: ["human"]
      assistant: ["gpt"]

val_set_size: 0
output_dir: /app/models/gptoss-20b-hedp

# XXX JB increase seq length after initial training
#sequence_len: 4096
sequence_len: 512
sample_packing: true
pad_to_sequence_len: true

wandb_project:
wandb_entity:
wandb_watch:
wandb_name:
wandb_log_model:

#pin_memory: true

# XXX JB both of these should probably be written dynamically like the ray stuff, not hardcoded
dataset_num_proc: 8
dataloader_num_workers: 4
#dataset_num_proc: 4
#dataloader_num_workers: 2

micro_batch_size: 4
gradient_accumulation_steps: 4
num_epochs: 100
max_steps: 50


optimizer: adamw_torch
lr_scheduler: constant_with_warmup
learning_rate: 2e-5

bf16: true
tf32: false

activation_offloading: false

logging_steps: 1
saves_per_epoch: 1

warmup_ratio: 0.03

# gptoss to avoid the ID mismatch warning
model_config_overrides:
  bos_token_id: 199998
  eos_token_id: 199999
  pad_token_id: 199999

deepspeed: /app/gpt-oss-20b-fft-hedp.zero3.json

#fsdp_config:
#  activation_checkpointing: true
#  offload_params: false
#  state_dict_type: SHARDED_STATE_DICT
#  auto_wrap_policy: TRANSFORMER_BASED_WRAP
#  transformer_layer_cls_to_wrap: GptOssDecoderLayer
#  reshard_after_forward: true
#  limit_all_gather_buffer: true
#  sync_module_states: true
#  use_orig_params: true

save_safetensors: true
ray_log_to_driver: false

#####################################################################################
# zenith autogenerated settings follow: data prep path, ray resource settings
#####################################################################################

